<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>J. Peterman Gallery</title>
<style>
  :root {
    --paper: #f4efe4;
    --ink: #2b2622;
    --accent: #7a1f2b;
    --rule: #d8cdb6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: Georgia, "Times New Roman", serif;
    line-height: 1.55;
  }
  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
    border-bottom: 2px solid var(--rule);
  }
  header h1 { font-size: 2.6rem; letter-spacing: .04em; margin: 0 0 .3rem; }
  header p { margin: 0; font-style: italic; color: var(--accent); }
  .gallery {
    column-count: 4;
    column-gap: 1.5rem;
    padding: 2rem;
    max-width: 1500px;
    margin: 0 auto;
  }
  @media (max-width: 1200px) { .gallery { column-count: 3; } }
  @media (max-width: 850px)  { .gallery { column-count: 2; } }
  @media (max-width: 560px)  { .gallery { column-count: 1; } }
  .card {
    display: block;
    break-inside: avoid;
    background: #fff;
    border: 1px solid var(--rule);
    margin: 0 0 1.5rem;
    box-shadow: 0 2px 10px rgba(0,0,0,.06);
    color: inherit;
    text-decoration: none;
    cursor: pointer;
    transition: box-shadow .2s ease, transform .2s ease;
  }
  .card:hover { box-shadow: 0 7px 24px rgba(0,0,0,.14); transform: translateY(-2px); }
  .card:visited { color: inherit; }
  .view {
    display: block;
    margin-top: .9rem;
    font-size: .78rem;
    font-style: italic;
    color: var(--accent);
    opacity: .75;
  }
  .art { position: relative; background: #fff; padding: 1rem 1rem 0; }
  .art img { display: block; width: 100%; height: auto; }
  .art .back {
    position: absolute;
    inset: 1rem 1rem 0;
    width: calc(100% - 2rem);
    opacity: 0;
    transition: opacity .35s ease;
  }
  .art.has-flip:hover .front { opacity: 0; }
  .art.has-flip:hover .back  { opacity: 1; }
  .art.has-flip::after {
    content: "hover \2192 sketch";
    position: absolute;
    bottom: .5rem; right: 1.3rem;
    font-size: .7rem; font-style: italic;
    color: var(--accent); opacity: .6;
  }
  .body { padding: 1rem 1.3rem 1.4rem; }
  .body h2 {
    font-size: 1.25rem;
    margin: .2rem 0 .6rem;
    border-bottom: 1px solid var(--rule);
    padding-bottom: .4rem;
  }
  .story p { margin: 0 0 .7rem; font-size: .95rem; }
  .story p:first-child { font-style: italic; }
  .more-wrap { text-align: center; padding: 1rem 1rem 4rem; }
  #count { display: block; margin-bottom: 1rem; color: #998; font-style: italic; }
  #more {
    font-family: inherit;
    font-size: 1.05rem;
    color: var(--paper);
    background: var(--accent);
    border: none;
    padding: .8rem 2.2rem;
    cursor: pointer;
    letter-spacing: .03em;
    transition: opacity .2s ease;
  }
  #more:hover { opacity: .85; }
  footer { text-align: center; padding: 2rem; color: #998; font-size: .85rem; }
</style>
</head>
<body>
<header>
  <h1>The Catalogue</h1>
  <p>351 pieces &mdash; each with its drawing and its story</p>
</header>
<main id="gallery" class="gallery"></main>
<div class="more-wrap">
  <span id="count"></span>
  <button id="more" type="button">Show me more</button>
</div>

const DATA = [{"t": "Alice's 1920s Dress", "s": ["100% polyester chiffon bodice shell. 100% polyester floral lace skirt overlay. Stretch knit lining (93% polyester 7% spandex) Pale aqua trim on front yoke inset. Knee length. Dry clean only."], "i": ["output/1920s-sheer-inset-dress/1920s-sheer-inset-dress-01.jpg"], "u": "https://jpeterman.com/products/1920s-sheer-inset-dress"}, {"t": "1927 Party Dress", "s": ["1927 Party Dress (No. J2924). Sleeveless, scoop-neck cream silk georgette, surprisingly substantial, with over 100,000 hand-strung baguette beads in seven tiers. The hemline falls just above your provocative knees; in Utah or Ohio, you could have been arrested (really) for wearing this breathtaking thing. Imported."], "i": ["output/1927-party-dress-fh24/1927-party-dress-fh24-01.jpg", "output/1927-party-dress-fh24/1927-party-dress-fh24-02.jpg", "output/1927-party-dress-fh24/1927-party-dress-fh24-03.jpg", "output/1927-party-dress-fh24/1927-party-dress-fh24-04.jpg", "output/1927-party-dress-fh24/1927-party-dress-fh24-05.jpg"], "u": "https://jpeterman.com/products/1927-party-dress-fh24"}, {"t": "1930's Silk Linen Gore Skirt", "s": ["Social Season, 1937.", "Last week it was Glorious Greenwood, “a garden party with racing tacked on,” as Edward VII put it; you wore a floral dress and hat, of course.", "Now, a short trot down to the Isle of Wight for Cowes Week, oldest regatta in the world.", "The Commodore has just reacquired the long-lost Queen’s Cup trophy from a Cardiff pawn shop, and you’ve been invited to present it with him on the first day of racing.", "This is the skirt you’ll have on in the Tatler photos. Posh fabric and style, quite at home in the Royal Southampton Yacht Club.", "1930s Gore Skirt (No. J8076), made of silky 100% poly with great luster and drape. Self-lining. Low-calf length. Nautical striped ribbon belt. Ten topstitched gores to swirl and catch the breeze off the water.", "Depression? What Depression? Imported."], "i": ["output/1930s-silk-lin t tunic with the personality of a shirtdress. Deliciously-cool 100% cotton with an intriguing allover block print. Wide neck band and placket. Shirring at neck in front and back. Flattering bust darts. Narrow self-tie belt at waist. Imported."], "i": ["output/cecilias-tunic-dress/cecilias-tunic-dress-01.jpg", "output/cecilias-tunic-dress/cecilias-tunic-dress-02.jpg", "output/cecilias-tunic-dress/cecilias-tunic-dress-03.jpg", "output/cecilias-tunic-dress/cecilias-tunic-dress-04.jpg"], "u": "https://jpeterman.com/products/cecilias-tunic-dress"}, {"t": "Chain Print Dress with Pockets", "s": ["Chain Print Dress with Pockets", "This fitted dress has black and blue abstract print (100% polyester) and fully lined in stretch poly. It features three-quarter sleeves, an invisible zipper in the back and falls just below the knee. Dry clean only."], "i": ["output/chain-print-dress-with-pockets/chain-print-dress-with-pockets-01.jpg", "output/chain-print-dress-with-pockets/chain-print-dress-with-pockets-02.jpg"], "u": "https://jpeterman.com/products/chain-print-dress-with-pockets"}, {"t": "Charleston Pants", "s": ["Charleston.", "Preston Parker’s mother has invited you to her annual “Linen & Bowtie” party. It’s sure to be a proverbial who’s who of Southern society, or so you’ve been warned.", "If convention holds, the men will wear linen suits and loud bowties, ribbing each other over which peacock has the greatest plume (God help the poor soul who wears a clip-on).", "The women will fawn over each other’s tasteful choices of linen dress. It’s all a very familiar scene.", "You’ve got linen. You loathe convention. You can procure an outrageous bowtie. And even though South Carolina law states you can be fined for keeping your horse in a bathtub, who’s to say you can’t flip the progressive script at Mrs. Parker’s party?", "No one. That’s who.", "Charleston Pants (No. 5967). Flat-front straight-leg pant in a stretch linen and cotton blend (55% linen, 43% cotton, 2% spandex). Handsome contrasting black satin waistband. Vertical seam down front legs. Back welt pockets. Gunmetal button at the front waist. 29” inseam. A sharp and versatile companion to most of your classic shirts and jackets. Imported.", "Spritely and dashing."], "i": ["output/charleston-pants/charleston-pants-01.jpg"], "u": "https://jpeterman.com/products/charleston-pants"}, {"t": "Chess Set with Harris Tweed Flask", "s": ["Chess Set with Harris Tweed Flask (No. J9053). The enduring allure of chess paired with Scottish craftsmanship. Our exquisite chess set box features a 6-ounce hip flask with a removeable Harris Tweed sleeve. (Depending on how the cloth has been cut may result in pattern variation, making each one unique.) The chess pieces are meticulously carved and nestled into a beautifully-presented wooden box. Set also includes four stainless cups and funnel.\nDimensions: 10\" W x 7\" D x 3\" H"], "i": ["output/chess-set-with-flask/chess-set-with-flask-01.jpg", "output/chess-set-with-flask/chess-set-with-flask-02.jpg"], "u": "https://jpeterman.com/products/chess-set-with-flask"}, {"t": "Chestnut Elegance Leather Tote", "s": ["Salient Features", "Full-Grain Buffalo Leather: Crafted from premium full-grain buffalo leather, it offers remarkable durability and a luxurious texture.", "Artisanal Excellence: Intricately handcrafted by skilled artisans, ensuring a unique testament to expert craftsmanship.", "Secure Velcro Closure: The reliable velcro closure safeguards your belongings while providing privacy.", "Handy Inside Pocket: Designed with an interior pocket for easy access to small essentials like coins and keys.", "Elegant Minimalist Design: The brown hue and minimalist style create a sleek, fashionable accessory suitable for any outfit.", "Versatile Functionality: Ideal for work and leisure, seamlessly combining fashion and practicality for today's busy women.", "Size in Inch", "16 H x 12 W x 4 D inch", "Size in Cm", "40.64 H x 30.48 W  x 10.16 D cm"], "i": ["output/ches es, and rose dusting powder.", "She smiles at him and laughs. “Look,” she says, “the oranges have rolled everywhere.”", "This moment will resonate in his memory for some while.", "Crew Neck Tier Dress (No. J6508). Midi-length textured dress with bodice lining, gathered crew neckline with keyhole opening at center front neck. Slight puff at shoulders. ¾-length sleeves. Poly bodice lining. Self-covered buttons. Fitted bodice with waist darts \nand two-tiered gathered skirt. Side zip closure. Imported"], "i": ["output/crew-neck-tier-dress/crew-neck-tier-dress-01.jpg", "output/crew-neck-tier-dress/crew-neck-tier-dress-02.jpg", "output/crew-neck-tier-dress/crew-neck-tier-dress-03.jpg", "output/crew-neck-tier-dress/crew-neck-tier-dress-04.jpg"], "u": "https://jpeterman.com/products/crew-neck-tier-dress"}, {"t": "Crocheted Vest", "s": ["Apologies to Those Who Crochet.", "Your delicate skills are admired and appreciated.", "You can now skip past the rest of this.", "To those who do not crochet, don’t bother learning. In the time it would to take you to get good enough to make this fully crocheted vest, you could be…", "Keeping warm at the game.", "Satisfying all your boho chic sensibilities downtown.", "Seeing your outfit smile after it realizes you’re putting this vest on.", "Learning other hobbies, like welding, photography, cooking, or herping.", "Let’s unravel the giddy details—like the vibrant yet earthy tones, the alluring length (to the knee-ish), the fringe detail (which your eccentric Aunt Caroline will love), or the swirl-patterned single button where the V-neckline meets.", "What will you do with all your free time?", "Crocheted Vest (No. 5779). Fully crocheted vest made of vibrant yet earthy panels of red, rust, brown, black, and white. Deep V-neckline with ivory crochet trim. Fringe detail along bottom. Large swirl-patterned button at center front. Soft and cozy wool blend fabric. Imported."], "i": ["output/crocheted-vest/crocheted-vest-01.jpg"], "u": "https:// vergence of art, soul, and performance that creates this feeling, an inexplicable magnetism that travels through the clapping rhythm of las palmas and the intoxicating percussion of feet and floor. Through a riotous swirl of ruffles. Through the guitar, through centuries. Then: skin-tingling goosebumps and a thrill of emotion.", "Every heartbeat in the room calibrates to the same mystical frequency.", "The dress explains all this better than I ever could.", "Flamenco Dress (No. J7258). An endlessly sensational flamenco-style wrap dress with a glorious ruffled skirt. In front, it falls just past the knee, but from there flows down to the ankles in back (you’ll want to wear this with a heel). Metallic embroidery and round foil mirrors catch every bit of candlelight. Fastens at wearer’s left with self-fabric tie in back. Ruffled hem. V-neck shape. Three-quarter sleeves. Made in India."], "i": ["output/flamenco-dress/flamenco-dress-01.jpg", "output/flamenco-dress/flamenco-dress-02.jpg"], "u": "https://jpeterman.com/products/flamenco-dress"}, {"t": "Cotton Poplin PJ Shirt", "s": ["Winter Silence.", "Put on these soft, snuggly cotton pajamas and almost immediately you’ll hear the silence that always precedes the beginning of a snowfall.", "You could pretend you’re doing it for the children.", "And that wouldn’t be entirely fictitious, would it?", "(Besides, the children won’t be the only ones who hear it, either.)", "And if at this place and at this time you don’t happen to have a mess of children (or none at all) and you don’t have a fieldstone fireplace either, then you’d better get these soft, cozy pajamas right away.", "You might even consider getting two pairs of them.", "Optimism never hurts.", "Cotton Poplin PJ Shirt (No. 6836). The ultimate 100% cotton poplin experience in a button-down shirt and with rounded, pressed collar and loose, boxy fit. Contrast piping. Light to medium weight. Pearlescent buttons. Cozy. Giftable. Imported."], "i": ["output/flannel-pj-shirt/flannel-pj-shirt-01.jpg", "output/flannel-pj-shirt/flannel-pj-shirt-02.jpg", "output/flannel-pj-shirt/flannel-pj-shirt-03.jpg", "output/flannel-pj-shirt/flannel-pj-shirt-04.jpg"], "u": "https://jpeterman.com/products/flannel-pj-shirt"}, {"t": "Louise Brooks Coat", "s": ["Louise Brooks Coat (No. J7734), like the one she wore when she crossed the Atlantic to be worshiped by G.W. Pabst’s camera. Soft, warm Italian wool-and-cashmere blend, satin lined. Single-button closure and 26” back vent for lots of movement. The shawl collar (10” wide max.) and cuffs are luxurious shearling. Imported."], "i": ["output/flapper-coat/flapper-coat-01.jpg", "output/flapper-coat/flapper-coat-02.jpg"], "u": "https://jpeterman.com/products/flapper-coat"}, {"t": "Winter Walk Plaid Flapper Cap", "s": ["Winter Walk Plaid Flapper Cap (No. J9057) in premium 100% wool. Adjustable inner band.  Stylish buckle. One size"], "i": ["output/flapper-hat/flapper-hat-01.jpg"], "u": "https://jpeterman.com/products/flapper-hat"}, {"t": "Flirtatious Ruffle Sleeve Dress", "s": ["The innocence of a ruffle is without a doubt one of the most enchanting, infallible powers a dress can possess. Women have known this for hundreds of years.", "A whisper of Marie Antoinette reincarnated as Myrna Loy in The Thin Man. Part confection, part inflection. A full measure of va-va-voom. Flirtation without effort. Are you really flirting if it comes off as innocently as this?", "Flirtatious Ruffle Sleeve Dress (No. 7386). Beautifully-fitted bias cut dress falls just above the ankle to a most becoming ruffle flourish. Made from deliciously silky viscose with light-catching allover beading on the front bodice and skirt. 3/4-length sleeves with ruffles that fall just at bracelet length. Slight ruching at at V-neckline Figure-flattering empire waist. Side seam zipper. Imported."], "i": ["output/flirtatious-ruffle-sleeve-dress/flirtatious-ruffle-sleeve-dress-01.jpg", "output/flirtatious-ruffle-sleeve-dress/flirtatious-ruffle-slee t wearer’s left and back zipper with hook and eye closure at top. Imported."], "i": ["output/floral-embroidered-cocktail-dress/floral-embroidered-cocktail-dress-01.jpg", "output/floral-embroidered-cocktail-dress/floral-embroidered-cocktail-dress-02.jpg", "output/floral-embroidered-cocktail-dress/floral-embroidered-cocktail-dress-03.jpg", "output/floral-embroidered-cocktail-dress/floral-embroidered-cocktail-dress-04.jpg"], "u": "https://jpeterman.com/products/floral-embroidered-cocktail-dress"}, {"t": "Floral Fringe Skirt", "s": ["Mocambo Club.", "Just in from Havana with your polo-playing friend for a few days in L.A.... already you’re being invited to the newest hot spot.", "“Mocambo Club, it’s better than the Copa. Cockatoos and macaws in glass cages along the walls. Mr. Mayer loves the place.”", "Cockatoos? Sounds like a reach, but it should be fun, and you’ve got the skirt to wear. The real thing.", "Show them how it’s done.", "Floral Fringe Skirt (No. 7442). Intriguing fringe skirt created from luxe double georgette. Dramatic hand-knotted fringe trim moves with you and just slightly after (the effect is utterly alluring, and the asymmetric handkerchief hem adds to the theatre of it). Princess darts for flattering fit.  The skirt's double layer creates an extra layer of fringe at bottom. Poly lining. Zipper on wearer's left side. Imported."], "i": ["output/floral-fringe-skirt/floral-fringe-skirt-01.jpg"], "u": "https://jpeterman.com/products/floral-fringe-skirt"}, {"t": "Floral Holiday Dress", "s": ["Just Off the Plane.", "When you walk into the stuffy office party at Dewey, Cheatum, & Howe wearing this flowing moody floral, gliding through the fray of stiff wools and pant suits like you’ve been to paradise and back, don’t be surprised if you get a few looks.", "“Where’d you come from?” she snarkily asks. (Go with Vietnam.)", "“But I saw you on Tuesday?How did—”", "“I just flew in and out for lunch. The vermicelli and jellyfish in Nha Trang is to die for. You sh es which is quite a statement.", "Laceophiles have been around since the 1600s. It’s been seen on men. Women. Wedding dresses. Battle armor (yes battle armor).", "Lace is intricate. Pretty. Highly feminine. It makes you feel lavish. Special. It’s also angelic yet slightly devilish. It gives you a taste of what’s underneath but not the whole thing. And that mystery is always a good thing.", "Maybe try it out on casual Friday and see what happens.", "The Lace Pant (No. 6460). Mid-rise, cropped ankle-length trouser with a raw, cut-lace hem. Contrast fused backing (see above: mystery). Side pockets. Zip fly with hook and bar closure. Two back double-welt pockets. Belt loops. Imported."], "i": ["output/lace-pants/lace-pants-01.jpg", "output/lace-pants/lace-pants-02.jpg"], "u": "https://jpeterman.com/products/lace-pants"}, {"t": "Lady Cavendish Silk Jacket", "s": ["1950. Devonshire.", "Lady Ainsley Cavendish is in the morning room, poring over the latest issue of Flair.", "Looking every inch like she stepped out from page 43 in this elegant silk jacket and pencil skirt.", "Made of luxurious silk dupioni, the best.", "The jacket, slightly boxy in cut, contrasts magnificently with the narrow cut of the pencil skirt.", "Both pieces, made with great devotion for the female figure.", "Some outfits can't wait for an audience, to be admired, to be envied.\n This one deserves a two-martini luncheon at the club.", "Lady Cavendish Silk Jacket (No. J7769). Made of luxurious silk dupioni. Shell buttons at center front. Bust darts and light shoulder pads. Poly lining. Imported.", "Complete the look with the Lady Cavendish Silk Pencil Skirt"], "i": ["output/lady-cavendish-silk-jacket/lady-cavendish-silk-jacket-01.jpg", "output/lady-cavendish-silk-jacket/lady-cavendish-silk-jacket-02.jpg", "output/lady-cavendish-silk-jacket/lady-cavendish-silk-jacket-03.jpg", "output/lady-cavendish-silk-jacket/lady-cavendish-silk-jacket-04.jpg", "output/lady-cavendish-silk-jacket/lady-cavendish-silk-jac -lucerne-wrap-dress"}, {"t": "Being Comfortable Hoodie", "s": ["Being Comfortable Hoodie (No. 4540). Soft cotton hoodie (with splash of lycra). Contrast thread at raglan and pocket. Ribbing at bottom, bands and cuffs. Double layer hood with contrast color. Center zipper with kissing placket. Embroidery detail at front and back shoulder. Pale green hood lining in Cream. Cream hood lining in Blue. Kangaroo pockets with contrast cover stitch at opening. Imported."], "i": ["output/lc-being-comfortable-hoodie/lc-being-comfortable-hoodie-01.jpg", "output/lc-being-comfortable-hoodie/lc-being-comfortable-hoodie-02.jpg"], "u": "https://jpeterman.com/products/lc-being-comfortable-hoodie"}, {"t": "Cargo Jacket", "s": ["Urban Assault.\nIn Barbados and Aruba you’ll be arrested for wearing camouflage.", "In Austin or Prague you will not.", "However, you will probably not go unnoticed in this cargo jacket so if invisibility is your intention I suggest a ghillie suit and a jungle. If chic urban assault is the Major’s orders…", "Carry on.", "The Cargo Jacket (No. 4613). 97% cotton with a little stretchy stuff. 4 button hidden placket with 1 angled button at placket’s top. Storm strap at underside of collar. Point collar with decorative stitching (5 rows of topstitching and large zigzag stitch at underside of collar). Self fabric half moon and locker loop at inside of center back. Shoulder epaulettes with button. Adjustable drawstring at inside waist tunnel. Four patch pockets at front with flap and hidden button closure. Adjustable button closure at sleeve tab. Imported."], "i": ["output/lc-cargo-jacket/lc-cargo-jacket-01.jpg"], "u": "https://jpeterman.com/products/lc-cargo-jacket"}, {"t": "Double Peplum Tunic", "s": ["Berry Good.", "It's early autumn (if even that).", "You don't have to get all dark and moody. No need for thermals. Hold off on servicing the furnace. Don't shake up the Boulevardiers just yet. Keep the earthy-toned wools and overcoats stashed—you're feeling far too peppy and bright to cover up.", "I have a solution.", "Remember the 80s-style peplum? Your mother probably does. That peplum had its own zipcode. We've updated it.", "This Double Peplum Tunic (No. 5770) has all the European charm you'd want without going PEPLUM overboard. Easy pullover style. Breezy poly satin fabric. Back yoke and waist-shaping darts to add to the figure-friendliness. Hidden button placket with dyed-to-match shell buttons. Finished off in a charming shade of berry with some daring cheetah-print leggings, and you're living life the way you want, regardless of the season. Rosé? It's 5 o'clock somewhere.  Imported."], "i": ["output/lc-double-peplum-tunic/lc-double-peplum-tunic-01.jpg", "output/lc-double-peplum-tunic/lc-double-peplum-tunic-02.jpg", "output/lc-double-peplum-tunic/lc-double-peplum-tunic-03.jpg"], "u": "https://jpeterman.com/products/lc-double-peplum-tunic"}, {"t": "Flutter Sleeve Silk Dress", "s": ["The Flutter Sleeve Silk Dress (No. 5585). Pleated flutter sleeve adorns this classic silk A-line to create the slightest bit of motion as you walk or dance. 100% silk. Wide, flattering waistband. Upper-calf length, invisible back zipper, fully lined. Add our captivating Victorian Lace Choker, and you’re instantly ready for your close-up. Imported."], "i": ["output/lc-flutter-sleeve-dress/lc-flutter-sleeve-dress-01.jpg", "output/lc-flutter-sleeve-dress/lc-flutter-sleeve-dress-02.jpg", "output/lc-flutter-sleeve-dress/lc-flutter-sleeve-dress-03.jpg", "output/lc-flutter-sleeve-dress/lc-flutter-sleeve-dress-04.jpg", "output/lc-flutter-sleeve-dress/lc-flutter-sleeve-dress-05.jpg", "output/lc-flutter-sleeve-dress/lc-flutter-sleeve-dress-06.jpg"], "u": "https://jpeterman.com/products/lc-flutter-sleeve-dress"}, {"t": "Gabriella Sweater", "s": [], "i": ["output/lc-gabriella-sweater/lc-gabriella-sweater-01.png"], "u": "https://jpeterman.com/products/lc-gabriella-sweater"}, {"t": "Mermaid Flare Dress", "s": ["A Bellboy's Infatuation.", "I carried up her luggage, overhearing her cell phone conversation.", "“He’s handsome… we’ll see.”", "It was the “we’ll see” that prompted me to turn around to find her unblinking stare set upon me, sending my heart aflutter. But I couldn’t hold her gaze, making it clear I was the bellboy and not the bellman.", "Later that night I saw her at the gala wearing a little black dress flared at the bottom with slender velvet gloves and a long crystal necklace she twirled in her fingers. She was with a man but he would be excused rather early. As she left the gala I saw her gloves still on the table and followed her to the elevator where I found her still twirling the necklace. Was she waiting for me? Had I misread the signals? Too late now.", "I handed her the gloves and our eyes and hands locked for longer than was comfortable.", "The necklace fell slack in her hand and I pulled her close, sending her heart aflutter. \nThe Mermaid Flare Dress (No. 4405). 100% polyester. Scoop neckline. French bust darts. Upper calf length with textured shimmering flounce. Back fitting darts. Fully lined. Imported.", "Women’s sizes: 0 through 20. \nColor: Black. \nPrice: $198"], "i": ["output/lc-mermaid-flare-dress/lc-mermaid-flare-dress-01.jpg"], "u": "https://jpeterman.com/products/lc-mermaid-flare-dress"}, {"t": "Monhegan Sweater", "s": ["Monhegan Sweater (No. 4420). Stylish shawl collar. Comfortable wool/acrylic blend. Kissing center front placket with small snap closure. Rib detail along sweep, pocket openings and neckline. Above knee length. Imported."], "i": ["output/lc-monhegan-sweater/lc-monhegan-sweater-01.jpg", "output/lc-monhegan-sweater/lc-monhegan-sweater-02.jpg"], "u": "https://jpeterman.com/products/lc-monhegan-sweater"}, {"t": "Necktie Lace Jacket", "s": ["Your Move.", "Double Windsor. Single Windsor. Doesn't matter. No one is looking at the tie or the knot, not really.", "Is it the lace that has their attention? Is it just the lace?", "Anyone with a pulse in this room is plotting his (or her) next move.", "Graydon asks to see your first edition of Finnegan's Wake(he's seen it twice already).", "Isobel wants you to decide between the Malbec or the Syrah (just pour something, darling). And Steven's subtle lift of an eyebrow points you toward the roof deck (okay, he's got your attention).", "You run the satin tie through your fingers and consider your next move.", "Necktie Lace Jacket (No. J5834). Luxury meets comfort in this relaxed-fit lace jacket.", "Reveals some, hints at the rest. Soft, cotton blend floral-patterned lace with alluring satin collar that ties at center front neckline. Devastating in its effect. Wear it with a white tank top and jeans or, like tonight, with a silky camisole and velvet pants. Open front placket. Satin facing at sleeve opening. Shoulder yoke with gathered detail below. Imported."], "i": ["output/lc-necktie-lace-jacket/lc-necktie-lace-jacket-01.jpg", "output/lc-necktie-lace-jacket/lc-necktie-lace-jacket-02.jpg", "output/lc-necktie-lace-jacket/lc-necktie-lace-jacket-03.jpg", "output/lc-necktie-lace-jacket/lc-necktie-lace-jacket-04.jpg"], "u": "https://jpeterman.com/products/lc-necktie-lace-jacket"}, {"t": "Satin Soirée Blouse", "s": ["Satin Soirée Blouse (No. J5824). Double V-neck (front and back) blouse in a stretch cotton-blend satin. Tailored fit with front princess seams and back-shaping darts. Full satin lining. Invisible zipper at center back. Strikingly simple. Simply striking. The best ideas usually are. Imported."], "i": ["output/lc-new-holiday-blouse/lc-new-holiday-blouse-01.jpg", "output/lc-new-holiday-blouse/lc-new-holiday-blouse-02.jpg", "output/lc-new-holiday-blouse/lc-new-holiday-blouse-03.jpg"], "u": "https://jpeterman.com/products/lc-new-holiday-blouse"}, {"t": "Ruffle Sleeve Blouse", "s": ["All for Show.", "Marie Antoinette loved all manner ofextravagant fashion (ruffles, especially), but her mother, the empress of Austria, was not having it. Once, upon receiving a portrait of her daughter dressed in magnificent finery, she wrote these chiding words: \"As you know, I have always been of the opinion that fashions should be followed in moderation but should never be taken to extremes.\"", "With all due respect, never say never, Empress.", "Sometimes more actually is more. This blouse is one such example. It belongs front and center. In front of the cameras.", "Never with the wallflowers. Never behind the scenes. Nowhere dark. Nowhere ordinary.", "Seen, admired, envied. It's all for show.", "All for Show Ruffle Sleeve Blouse (No. 5830). Fitted long-sleeve blouse in poly georgette with self-fabric ruffles down sleeves and front bodice. Exuberant rose print (not loud, only confident). V-neckline in front with mock collar that wraps to the back to form a sash that ties and drapes and flutters down your back. Front princess seams, back-shaping darts. Six self-covered buttons down center front. Lined in black crepe de chine. Imported."], "i": ["output/lc-ruffle-sleeve-blouse/lc-ruffle-sleeve-blouse-01.jpg", "output/lc-ruffle-sleeve-blouse/lc-ruffle-sleeve-blouse-02.jpg"], "u": "https://jpeterman.com/products/lc-ruffle-sleeve-blouse"}, {"t": "Theatre Skirt", "s": ["100% Polyester\nDry Clean Only\nNo Bleach\nCool Iron"], "i": ["output/lc-russian-theatre-skirt/lc-russian-theatre-skirt-01.jpg"], "u": "https://jpeterman.com/products/lc-russian-theatre-skirt"}, {"t": "The One Corduroys", "s": [], "i": ["output/lc-the-one-corduroys/lc-the-one-corduroys-01.jpg", "output/lc-the-one-corduroys/lc-the-one-corduroys-02.jpg", "output/lc-the-one-corduroys/lc-the-one-corduroys-03.jpg", "output/lc-the-one-corduroys/lc-the-one-corduroys-04.jpg", "output/lc-the-one-corduroys/lc-the-one-corduroys-05.jpg", "output/lc-the-one-corduroys/lc-the-one-corduroys-06.jpg"], "u": "https://jpeterman.com/products/lc-the-one-corduroys"}, {"t": "Velvet-Trimmed Blazer", "s": ["Opinions.", "The only thing worse than being over-opinionated is having nothing to say.", "You'll say a lot in this blazer without uttering a word.", "By choosing a single-button low stance blazer with a velvet stand-up collar, you send ripples through the crowd, causing men to recoil at the sight of their own mundane jackets and women to question why they're all in the same little black dress.", "When the dust settles, conversations turn to the topics of the day: cryptocurrency, the tiny house movement, the debt ceiling. You make some solid points, causing even the most argumentative to question his position. Your biographer jots down \"legacy of cool\" as a chapter heading. Clearly, you've said allthe right things.", "The Velvet-Trimmed Blazer (No. 5439). 100% wool from Botto Giuseppe in Italy. Velvet stand-collar, velvet-trimmed besom pocket at each hip, and velvet appliqué embroidery at wrists. Single-button front. Fully lined.Imported."], "i": ["output/lc-velvet-trimmed-blazer/lc-velvet-trimmed-blazer-01.jpg", "output/lc-velvet-trimmed-blazer/lc-velvet-trimmed-blazer-02.jpg", "output/lc-velvet-trimmed-blazer/lc-velvet-trimmed-blazer-03.jpg"], "u": "https://jpeterman.com/products/lc-velvet-trimmed-blazer"}, {"t": "Essential Leggings", "s": ["Essential Leggings (No. J8816). Meet our new updated design to a customer favorite. Fitted leggings in a deliciously comfortable spandex/nylon jersey blend with dyed-to-match topstitch detail at seams. Non-frumpy, waist-trimming, wide elastic waistband. Ankle length. Imported."], "i": ["output/leggings/leggings-01.jpg", "output/leggings/leggings-02.jpg", "output/leggings/leggings-03.jpg", "output/leggings/leggings-04.jpg", "output/leggings/leggings-05.jpg", "output/leggings/leggings-06.jpg", "output/leggings/leggings-07.jpg", "output/leggings/leggings-08.jpg", "output/leggings/leggings-09.jpg"], "u": "https://jpeterman.com/products/leggings"}, {"t": "Leopard Wrap Maxi Skirt", "s": ["Skirt ties on wearer's right.\nSweep of ruffle on the left and encircles the hem.\nMidcalf length.", "One Pattern. Endless Interpretations.", "Leopard.", "Irresistible. Dangerous. Playful.", "Lithe. Sophisticated.", "Powerful. Splendid.", "The chicest women have even come to think of leopard as a neutral, in function, if not in spirit. Looks marvelous with black or gold or brown. With scarlet, cobalt, emerald. Anchors an ensemble in a way no other pattern can.", "First seen on the runway in 1947. Later on the character of Helen St. James in The Lost Weekend. But never against the wall, merely observing.", "And yet. The ruffle indicates something demure.", "The combination is devastating. Confounding. Magnificent.", "But neutral? Only in the service of your grand plans.", "Leopard Wrap Maxi Skirt (No. 6465). Sweep of ruffle on the left and encircles the hem. Skirt ties on wearer's right. Midcalf length. Imported.", "*Model is 5' 10\" and is wearing a size extra small."], "i": ["output/leopard-wrap-maxi-skirt/leopard-wrap-maxi-skirt-01.jpg", "output/leopard-wrap-maxi-skirt/leopard-wrap-maxi-skirt-02.jpg", "output/leopard-wrap-maxi-skirt/leopard-wrap-maxi-skirt-03.jpg", "output/leopard-wrap-maxi-skirt/leopard-wrap-maxi-skirt-04.jpg", "output/leopard-wrap-maxi-skirt/leopard-wrap-maxi-skirt-05.jpg", "output/leopard-wrap-maxi-skirt/leopard-wrap-maxi-skirt-06.jpg"], "u": "https://jpeterman.com/products/leopard-wrap-maxi-skirt"}, {"t": "Lightweight Denim Wide Legs", "s": ["Zig When They Zag.", "Women today are flocking to tight designer jeans, narrow at the bottom and low at the waist, hoping to accomplish what the gym couldn’t.", "Well, their wallets are thinner.", "You, on the other hand, have never been one to follow the crowd. So I’d like to suggest something different. A new take on the silhouette that made stars like Harlow lankier, leggier.", "Yes, wide-legged pants in denim.", "“Hmm, you look taller, somehow. New hairdresser?”", "I spotted the original in Paris, where they know a few things about flattering the female form.", "Lightweight Denim Wide Legs (No. 2388). In soft, weathered cotton. Clean Hollywood waistband with big well-space s you’d get blue, sometimes pink.", "In 1897, a dentist (if you can believe it) and a confectioner were the first inventors of machine-spun cotton candy. Seven years later, they introduced it on a grand scale as “Fairy Floss” at the 1904 World’s Fair in St. Louis, to great success. A box of the confection sold for 25¢, or $7.11 in today’s money. The pair sold 68,655 boxes of the stuff, enough to earn them the equivalent of a cool half mil.", "Positively dreamy.", "Striped Poplin PJ Pant (No. 6835) in cool 100% cotton striped poplin. White grosgrain drawstring. Elasticized back waistband. Cuffed hem. White cotton piping. Imported."], "i": ["output/striped-poplin-pj-pants/striped-poplin-pj-pants-01.jpg", "output/striped-poplin-pj-pants/striped-poplin-pj-pants-02.jpg", "output/striped-poplin-pj-pants/striped-poplin-pj-pants-03.jpg", "output/striped-poplin-pj-pants/striped-poplin-pj-pants-04.jpg"], "u": "https://jpeterman.com/products/striped-poplin-pj-pants"}, {"t": "Striped Poplin PJ Shirt", "s": ["Sweet Dreams.", "You’ve seen these colors before, at any county fair worth its salt, when you handed over your dollar at the cotton candy stand.", "Sometimes you’d get blue, sometimes pink.", "In 1897, a dentist (if you can believe it) and a confectioner were the first inventors of machine-spun cotton candy. Seven years later, they introduced it on a grand scale as “Fairy Floss” at the 1904 World’s Fair in St. Louis, to great success. A box of the confection sold for 25¢, or $7.11 in today’s money. The pair sold 68,655 boxes of the stuff, enough to earn them the equivalent of a cool half mil.", "Positively dreamy.", "Striped Poplin PJ Shirt (No. J6834). Cuffed short sleeve PJ shirt in cool 100% cotton striped poplin. Peter Pan collar. Center front placket with faux mother of pearl buttons. White cotton piping. Imported."], "i": ["output/striped-poplin-pj-shirt/striped-poplin-pj-shirt-01.jpg", "output/striped-poplin-pj-shirt/striped-poplin-pj-shirt-02.jpg", "output/striped-poplin-pj-shirt/striped-poplin-pj-shirt-03.jpg", "output/striped-poplin-pj-shirt/striped-poplin-pj-shirt-04.jpg"], "u": "https://jpeterman.com/products/striped-poplin-pj-shirt"}, {"t": "Striped Safari Jacket", "s": ["Safari. Day 9.", "In camp, the guides aren’t impatient (yet), but you can see the edges of professional disposition starting to fray.", "You, though. Calm, cool, crisp. Bolstered, perhaps, by having just the right thing to wear.", "This jacket. Seen first as a shirt on 19th-century hunters, a case of style emerging from function. Expanding pockets for a map or a compass. Epaulettes. Some had slots for cartridges. All offered clues to a certain narrative, a certain understanding between the wearer and the world.", "In time, women began to wear the safari jacket, too, and it said the same things.", "Imagine a scenario where a woman is both hunter and gazelle.", "This is like that.", "Striped Safari Jacket (No. 7546). Elegant over a crisp white shirt. Dazzling over a T-shirt, a tank top, or shorts. Functional everywhere. Robust cotton and linen blend. Generous patch pockets. Epaulettes for keeping a strap (camera or purse) in place. Self-belt with sturdy metal slide. Reinforced placket and seams. Gussets at back for ease of movement. Imported."], "i": ["output/striped-safari-jacket/striped-safari-jacket-01.jpg", "output/striped-safari-jacket/striped-safari-jacket-02.jpg", "output/striped-safari-jacket/striped-safari-jacket-03.jpg", "output/striped-safari-jacket/striped-safari-jacket-04.jpg"], "u": "https://jpeterman.com/products/striped-safari-jacket"}, {"t": "Santorini Suede Ballet Flats", "s": ["Santorini Whimsy.", "Slip on these flirty suede sandals with whimsical lace-up ties and head to Agiou Street to drink xiboquinha with your best friend.Santorini Suede Ballet Flats (No. 7147). Luxurious suede lace-up sandal in Italian leather suede. Leather stack sole. Made in Italy."], "i": ["output/suede-ballet-flats/suede-ballet-flats-01.jpg", "output/suede-ball -rose-01.jpg", "output/sweater-shift-dress-in-heathered-rose/sweater-shift-dress-in-heathered-rose-02.jpg", "output/sweater-shift-dress-in-heathered-rose/sweater-shift-dress-in-heathered-rose-03.jpg", "output/sweater-shift-dress-in-heathered-rose/sweater-shift-dress-in-heathered-rose-04.jpg"], "u": "https://jpeterman.com/products/sweater-shift-dress-in-heathered-rose"}, {"t": "Swirls Hat", "s": ["First Saturday in May.", "Swirls Hat (No. J8053). Masterfully created by Formé Millinery. (You've seen her beautiful work at the derby.) Glazed toyo flip brim with sinamay trim and sculpted swirls. Fits head sizes 21\"-23\" with an adjustable sweatband. Handcrafted in Louisville, Kentucky."], "i": ["output/swirls-hat/swirls-hat-01.jpg", "output/swirls-hat/swirls-hat-02.jpg", "output/swirls-hat/swirls-hat-03.jpg"], "u": "https://jpeterman.com/products/swirls-hat"}, {"t": "British Tartan Trouser", "s": ["British Tartan Trouser (No. J8583). Elegant viscose blend trouser in a distinctive tartan pattern. A smidge of spandex for a bit of give. Lined in poly crepe de chine. Zipper and one button at center front waist. Two pockets at front. Belt loops. Imported."], "i": ["output/tartan-trouser-red-tartan/tartan-trouser-red-tartan-01.jpg", "output/tartan-trouser-red-tartan/tartan-trouser-red-tartan-02.jpg", "output/tartan-trouser-red-tartan/tartan-trouser-red-tartan-03.jpg", "output/tartan-trouser-red-tartan/tartan-trouser-red-tartan-04.jpg"], "u": "https://jpeterman.com/products/tartan-trouser-red-tartan"}, {"t": "Tate & Lucille Dress", "s": ["• Dolman-style dropped armhole• Low-calf length• Low-calf length• Poly crepe shell is fully lined in acetate taffeta\nTate & Lucille.", "Tate, meet Lucille. Lucille, meet Tate. You two will get along fabulously.", "Lucille loves vintage. Drive-ins. Soda jerks. Nightclub acts. Polka dots and pleats.", "Tate's from London. She's very modern. Bold and crisp. She has a flare for galleries and panache. Lucille's a ball, hilarious. And since Tatelikes a pop of color, I know this will be a match made in heaven.", "And I'm never wrong about these things.", "Tate & Lucille Dress (No. 5937). When vintage and contemporary get on so well, it ought to be illegal. We must start (and end) with the ensemble of pleats since this entire fit-and-flare style dress has alternating box and knife pleats of varying widths from head to toe, all stitched down, just below the bust to the hip area. Combined with the print, the effects are fabulously hypnotic. There is an invisible zipper on left side.", "Other noteworthy details include the demure self-fabric ruffle detail along your neckline, dolman-style dropped armhole, and low-calf length. The poly crepe shell is fully lined in acetate taffeta. Imported."], "i": ["output/tate-lucille-dress/tate-lucille-dress-01.jpg", "output/tate-lucille-dress/tate-lucille-dress-02.jpg", "output/tate-lucille-dress/tate-lucille-dress-03.jpg", "output/tate-lucille-dress/tate-lucille-dress-04.jpg", "output/tate-lucille-dress/tate-lucille-dress-05.jpg"], "u": "https://jpeterman.com/products/tate-lucille-dress"}, {"t": "Teddy Readers", "s": ["Teddy Readers (No. J5198). The aluminum frame is lightweight and hypoallergenic. Adjustable nose pads. Hint: When your eyeline is above your eyewear people tend to pay attention. Magnifications: 1.5 (just enough). 2.0 (snaps printed word back into sharp focus). 2.5 (a little stronger). 3.0 (if your spouse is reading this for you)."], "i": ["output/teddy-readers/teddy-readers-01.jpg", "output/teddy-readers/teddy-readers-02.jpg", "output/teddy-readers/teddy-readers-03.jpg", "output/teddy-readers/teddy-readers-04.jpg"], "u": "https://jpeterman.com/products/teddy-readers"}, {"t": "The Artist's Ruffle Dress", "s": ["To the Troublemakers.", "“The dealings with artists, for instance, require great prudence; they are acquainted with all classes of society, and for that very reason dangerous...and when you have too much to do with them, you are sure to have des ennuis…”", "—King Leopold to Queen Victoria, 10th October 1845", "Those artists, those troublemakers.", "You, for instance, are possessed of more than your fair share of creativity.", "Look what you accomplished with a palette of greys and browns all winter long.", "Imagine what you can do with these dazzling colors.", "The Artist’s Ruffle Dress (No. 6496). Creativity abounds in this 100% silk crepe de chine floral dress in a vivid archival print from the Ratti Mill. Imported."], "i": ["output/the-artist-s-ruffle-dress/the-artist-s-ruffle-dress-01.jpg", "output/the-artist-s-ruffle-dress/the-artist-s-ruffle-dress-02.jpg"], "u": "https://jpeterman.com/products/the-artist-s-ruffle-dress"}, {"t": "The Carnevale Duster", "s": ["The Carnevale Duster (No. J8860). Embroidered button-up duster that transforms into a dress with several buttons done up nicely (the exact number is entirely up to you and your whims). Comfortable, midi length cotton shell embellished with rather glorious embroidery. Velvet center front placket and velvet panel at center back. Side slits add interest to the proceedings. Two side pockets. Velvet panels made from a poly/spandex blend. Perfect for the festivities with a mask of your choice. Imported."], "i": ["output/the-carnevale-duster/the-carnevale-duster-01.jpg", "output/the-carnevale-duster/the-carnevale-duster-02.jpg", "output/the-carnevale-duster/the-carnevale-duster-03.jpg", "output/the-carnevale-duster/the-carnevale-duster-04.jpg", "output/the-carnevale-duster/the-carnevale-duster-05.png", "output/the-carnevale-duster/the-carnevale-duster-06.jpg", "output/the-carnevale-duster/the-carnevale-duster-07.jpg"], "u": "https://jpeterman.com/products/the-carnevale-duster"}, {"t": "The Counterfeit Mailbag", "s": ["The Counterfeit Mailbag (No. J1005). Containing one vast, unzippered pocket, and another zippered. Shoulder strap and handle. Nickel hardware. Strong, soft leather that will only get better. Imported.", "Size: 14.5” long x 12.5” tall with a 4.5\" depth at top opening and a 7.5\" depth at the base.", "Weight: 3.15 lbs. empty", "Material: 100% leather", "Details: Front flap: 14.5\" wide x 12” tall\nZipper pocket: 12.5” wide x 12\" deep\nShoulder strap: 1\" wide, adjustable for 26\" to 39\" length", "How to take care of the Mailbag.", "The first scratch will kill you, but in fact, it’s the first step in the right direction: patina.", "So the sooner it gets scratched, nicked, bumped, dug, hit, squeezed, dropped, bent, folded, and rained on, the better. Really.", "When you receive your mailbag, it’s so fiercely new looking I’m almost ashamed of it. But there’s no choice. It would cost too much to pre-age each mailbag before sending it out to a customer. (Antiques cost more than new, for a reason.)", "Here’s my recipe for “accelerating” the aging process. First, spend one day (the day you get it) the way it is. Brand new. Then, the next day, scratch it all over with your fingernails. Lightly. This will horrify you, at first. Then, spray-mist it with plain water, lightly. Let it dry. The scratches will lose their rawness. They will look old. Repeat this treatment as often as you can stand to; once a week for 5 weeks. Then once a year. (Clean mailbag with plain water only. Not petrochemicals, not oils, not detergents, not mystery solvents, not leather “cremes.” It will do just fine with plain water and will outlast both of us.)"], "i": ["output/the-counterfeit-mailbag/the-counterfeit-mailbag-01.jpg", "output/the-counterfeit-mailbag/the-counterfeit-mailbag-02.jpg", "output/the-counterfeit-mailbag/the-counterfeit-mailbag-03.jpg", "output/the-counterfeit-mailbag/the-counterfeit-mailbag-04.jpg", "output/the-counterfeit-mailbag/the-counterfeit-mailbag-05.jpg"], "u": "https://jpeterman.com/products/the-counterfeit-mailbag"}, {"t": "The Grand Tour Floral Caftan", "s": ["The Grand Tour Floral Caftan (No. J7933). Beautiful maxi length floral caftan in silky 100% viscose (feels like a late summer breeze as it drifts over your const BATCH = 12;
const gallery = document.getElementById('gallery');
const moreBtn = document.getElementById('more');
const countEl = document.getElementById('count');
let shown = 0;

// Open a URL in a background tab. A plain click can't be forced into the
// background, so we synthesize a Cmd/Ctrl-click, which browsers honor by
// opening a new tab without moving focus.
function openBackgroundTab(url) {
  const a = document.createElement('a');
  a.href = url;
  a.target = '_blank';
  a.rel = 'noopener';
  a.dispatchEvent(new MouseEvent('click', {
    bubbles: true, cancelable: true, ctrlKey: true, metaKey: true
  }));
}

function makeCard(p) {
  const card = document.createElement('a');
  card.className = 'card';
  card.href = p.u;                 // real link: middle-click / "open in new tab" work natively
  card.target = '_blank';
  card.rel = 'noopener';
  card.addEventListener('click', function (e) {
    // let the browser handle modified or non-left clicks natively
    if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
    e.preventDefault();
    openBackgroundTab(p.u);
  });

  const art = document.createElement('div');
  art.className = 'art' + (p.i.length > 1 ? ' has-flip' : '');
  const front = document.createElement('img');
  front.className = 'front';
  front.loading = 'lazy';
  front.alt = p.t;
  front.src = p.i[0];
  art.appendChild(front);
  if (p.i.length > 1) {
    const back = document.createElement('img');
    back.className = 'back';
    back.loading = 'lazy';
    back.alt = p.t + ' sketch';
    back.src = p.i[1];
    art.appendChild(back);
  }

  const body = document.createElement('div');
  body.className = 'body';
  const h = document.createElement('h2');
  h.textContent = p.t;            // textContent => no HTML injection
  body.appendChild(h);
  const story = document.createElement('div');
  story.className = 'story';
  p.s.forEach(function (para) {
    const el = document.createElement('p');
    el.textContent = para;
    story.appendChild(el);
  });
  body.appendChild(story);

  const view = document.createElement('span');
  view.className = 'view';
  view.textContent = 'View on jpeterman.com \u2197';
  body.appendChild(view);

  card.appendChild(art);
  card.appendChild(body);
  return card;
}

function showMore() {
  const next = DATA.slice(shown, shown + BATCH);
  const frag = document.createDocumentFragment();
  next.forEach(function (p) { frag.appendChild(makeCard(p)); });
  gallery.appendChild(frag);
  shown += next.length;
  countEl.textContent = 'Showing ' + shown + ' of ' + DATA.length;
  if (shown >= DATA.length) moreBtn.style.display = 'none';
}

moreBtn.addEventListener('click', showMore);
showMore();  // initial batch
</script>
